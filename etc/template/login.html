<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #fff; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 2rem; width: 100%; max-width: 400px; }
        h2 { margin-bottom: 1.5rem; text-align: center; color: #333; }
        label { display: block; margin-bottom: 0.25rem; font-size: 0.875rem; color: #555; }
        input { width: 100%; padding: 0.5rem 0.75rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 4px; font-size: 0.875rem; }
        input:focus { outline: none; border-color: #4a90d9; }
        button { width: 100%; padding: 0.6rem; border: none; border-radius: 4px; font-size: 0.875rem; cursor: pointer; }
        .btn-primary { background: #4a90d9; color: #fff; }
        .btn-primary:hover { background: #357abd; }
        .btn-copy { background: #28a745; color: #fff; margin-top: 0.5rem; }
        .btn-copy:hover { background: #218838; }
        .error { color: #dc3545; font-size: 0.8rem; margin-bottom: 1rem; display: none; }
        .token-box { display: none; margin-top: 1.5rem; }
        .token-box label { font-weight: 600; }
        .token-value { width: 100%; min-height: 80px; padding: 0.5rem 0.75rem; border: 1px solid #ddd; border-radius: 4px; background: #f8f9fa; font-family: monospace; font-size: 0.75rem; word-break: break-all; resize: none; }
        .copied { font-size: 0.8rem; color: #28a745; text-align: center; margin-top: 0.25rem; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>
        <form id="loginForm">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required autofocus>
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <div class="error" id="error"></div>
            <button type="submit" class="btn-primary" id="loginBtn">Login</button>
        </form>
        <div class="token-box" id="tokenBox">
            <label>Bearer Token</label>
            <textarea class="token-value" id="tokenValue" readonly></textarea>
            <button class="btn-copy" id="copyBtn">Copy to Clipboard</button>
            <div class="copied" id="copiedMsg">Copied!</div>
        </div>
    </div>
    <script>
        const form = document.getElementById("loginForm");
        const errorEl = document.getElementById("error");
        const tokenBox = document.getElementById("tokenBox");
        const tokenValue = document.getElementById("tokenValue");
        const copyBtn = document.getElementById("copyBtn");
        const copiedMsg = document.getElementById("copiedMsg");
        const loginBtn = document.getElementById("loginBtn");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            errorEl.style.display = "none";
            tokenBox.style.display = "none";
            loginBtn.textContent = "Logging in...";
            loginBtn.disabled = true;

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            try {
                const res = await fetch("{{ .loginPath }}", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password }),
                });

                const body = await res.json();

                if (!res.ok || !body.isSuccess) {
                    errorEl.textContent = (body.message && body.message.title) || "Login failed";
                    errorEl.style.display = "block";
                    return;
                }

                const token = body.data.accessToken;
                tokenValue.value = "Bearer " + token;
                tokenBox.style.display = "block";
            } catch (err) {
                errorEl.textContent = "Network error";
                errorEl.style.display = "block";
            } finally {
                loginBtn.textContent = "Login";
                loginBtn.disabled = false;
            }
        });

        copyBtn.addEventListener("click", () => {
            navigator.clipboard.writeText(tokenValue.value).then(() => {
                copiedMsg.style.display = "block";
                setTimeout(() => { copiedMsg.style.display = "none"; }, 2000);
            });
        });
    </script>
</body>
</html>
